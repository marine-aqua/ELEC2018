# 课程名称
course_name = "信号与系统"

# 仓库类型: normal | multi-project
repo_type = "normal"

# 课程代码 (用于检索)
course_code = "ELEC2018"

# 课程简介
description = """
信号与系统，讲授连续 / 离散时间信号与系统的时域与变换域分析等经典内容。不同年级、专业下课程性质不同：23 级计信集群为必修考试课、人工智能班为必修考查课；24 级空天集群为必修考试课、人工智能班为限选课；25 级通信专业为必修（专业轨道课）、人工智能班为限选课。
"""

