[[sections]]
title = "课程内容"

[[sections.items]]
content = """
大致覆盖（按实际授课与笔记整理，供参考）：

- 信号与系统的基本概念
- 连续时间系统的时域分析
- 傅里叶变换及其应用
- 拉普拉斯变换
- 离散时间系统的时域分析
- Z 变换
- 信号流图与系统的状态变量分析
"""
author = { name = "aqua", link = "https://github.com/marine-aqua", date = "2026-07" }

[[sections]]
title = "课程建议"

[[sections.items]]
content = """
- 课堂限时习题（约 30 秒～2 分钟）难度不小，建议跟紧课堂节奏，及时消化变换域与时域方法
- 过程性考核分量重（智慧树线上学习 30% + 课堂参与 10%），平时勿拖欠
- 期末为闭卷、答题卡阅卷；主观题需写清步骤，复习可对照本仓库笔记、习题精编与回忆卷
"""
