[[sections]]
title = "考核方式"

[[sections.items]]
content = """
本课程采用过程性考核。

- 期末考试（闭卷）：50%。答题卡电子阅卷，请带好 2B 铅笔涂卡；分客观题（选择、填空）与主观题（写步骤解答）；可携带无存储功能的计算器；满分 100 分
- 智慧树线上学习：30%
- 课堂参与：10%（签到 + 智慧树答题）
- 实验实践：10%

课程互动（签到、答题）在小程序「智慧树学习中心」或「知到」App 进行。
"""
author = { name = "aqua", link = "https://github.com/marine-aqua", date = "2026-07" }

